# Render blueprint — deploys the Collaboration Hub as a free web service.
# In Render: New → Blueprint → connect this repo. Render reads this file.
services:
  - type: web
    name: collab-hub
    runtime: python
    plan: free
    region: frankfurt            # closest Render region to the UK
    buildCommand: pip install -r requirements.txt
    startCommand: python init_db.py && gunicorn wsgi:app --bind 0.0.0.0:$PORT --timeout 600 --workers 1
    envVars:
      - key: SECRET_KEY
        generateValue: true      # Render generates a strong secret
      - key: PYTHON_VERSION
        value: "3.11.9"
